name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]   # usamos solo 18 porque ya vimos que tu proyecto lo soporta bien

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install   # usamos install en vez de ci para evitar conflictos si package-lock no está 100%

    - name: Build app
      run: npm run build --if-present

    - name: Run tests (optional)
      run: npm test --if-present
